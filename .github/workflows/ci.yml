name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/

      - name: Build extension
        run: ./gradlew buildExtension --no-daemon

      - name: Upload .oxt artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathnotes-addon-snapshot
          path: build/dist/*.oxt